name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: feishu_iam_test
          POSTGRES_USER: feishu_iam
          POSTGRES_PASSWORD: feishu_iam
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U feishu_iam -d feishu_iam_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run server:build

      - name: Run server tests
        run: npm run server:test
        env:
          TEST_DATABASE_URL: postgres://feishu_iam:feishu_iam@127.0.0.1:55432/feishu_iam_test

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build Docker image
        run: docker build -t feishu-iam:ci .
