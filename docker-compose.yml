services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: feishu-iam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-feishu_iam}
      POSTGRES_USER: ${POSTGRES_USER:-feishu_iam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feishu_iam} -d ${POSTGRES_DB:-feishu_iam}"]
      interval: 10s
      timeout: 5s
      retries: 10

  feishu-iam:
    build:
      context: .
      args:
        NODE_IMAGE: ${FEISHU_IAM_NODE_IMAGE:-node:24-alpine}
    image: feishu-iam:${FEISHU_IAM_IMAGE_TAG:-local}
    container_name: feishu-iam
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4100
      STATIC_ASSETS_DIR: /app/dist
      DATABASE_URL: postgres://${POSTGRES_USER:-feishu_iam}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-feishu_iam}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-iam_session}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      FEISHU_AUTH_MODE: ${FEISHU_AUTH_MODE:?FEISHU_AUTH_MODE is required}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_REDIRECT_URI: ${FEISHU_REDIRECT_URI:-}
      FEISHU_EVENT_VERIFICATION_TOKEN: ${FEISHU_EVENT_VERIFICATION_TOKEN:-}
      FEISHU_EVENT_ENCRYPT_KEY: ${FEISHU_EVENT_ENCRYPT_KEY:-}
    ports:
      - "${FEISHU_IAM_HOST_PORT:-8002}:4100"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4100/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
